name: Print Software Versions

on:
  push:
    branches:
      - main

jobs:
  application-server:
    runs-on: ubuntu-latest

    steps:
      - name: Print application software version
        run: |
          python3 --version
          node --version

  database-server:
    runs-on: ubuntu-latest
    needs: application-server

    steps:
      - name: Print database software version
        run: |
          mysql --version
